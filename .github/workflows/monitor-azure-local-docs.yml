name: Generate Blog from Azure Docs Changes

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/monitor-azure-local-docs.yml'
      - 'scripts/generate-blog.js'
  workflow_dispatch: {}
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Azure Local doc changes
        id: fetch-commits
        run: |
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=100")
          
          # Filter for Azure Local documentation changes
          FILTERED=$(echo "$RESPONSE" | jq -c '[.[] | select(.commit.message | contains("azure-local") or contains("Azure Local") or contains("azure/local"))]')
          
          # If no direct mentions, get first matching deployment/config commit
          if [ "$(echo "$FILTERED" | jq 'length')" == "0" ]; then
            FILTERED=$(echo "$RESPONSE" | jq '[.[] | select(.commit.message | test("(deploy|upgrade|update|security|config)", "i"))] | .[0:1]' -c)
          fi
          
          # For the first matching commit, fetch full details including diff
          if [ "$(echo "$FILTERED" | jq 'length')" -gt "0" ]; then
            SHA=$(echo "$FILTERED" | jq -r '.[0].sha')
            FULL_COMMIT=$(curl -s -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits/$SHA")
            
            # Add the full commit details to our output
            echo "commits=$(echo "$FULL_COMMIT" | jq -c '{sha: .sha, message: .commit.message, author: .commit.author.name, files: .files | map({filename, additions, deletions, patch})}')" >> $GITHUB_OUTPUT
          else
            echo "commits={}" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Generate blog with Claude
        id: generate-blog
        run: |
          # Use the enhanced generate-blog.js script
          node scripts/generate-blog.js > /tmp/blog.json 2>&1
          
          # Log the output for debugging
          echo "Blog generation output:"
          cat /tmp/blog.json
          
          if [ -f /tmp/blog.json ] && [ -s /tmp/blog.json ] && [ "$(cat /tmp/blog.json | wc -l)" -gt 0 ]; then
            # Check if we got a valid post (not an error message)
            if grep -q '"id"' /tmp/blog.json; then
              echo "blog_post<<EOFBLOG" >> $GITHUB_OUTPUT
              cat /tmp/blog.json >> $GITHUB_OUTPUT
              echo "EOFBLOG" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update blogs-data.json
        run: |
          BLOG_JSON='${{ steps.generate-blog.outputs.blog_post }}'
          
          # Check if blog post is valid JSON
          if ! echo "$BLOG_JSON" | jq empty 2>/dev/null; then
            echo "Invalid blog JSON, skipping"
            exit 0
          fi
          
          # Update blogs-data.json
          jq ".auto_posts |= [$(echo "$BLOG_JSON")] + ." blogs-data.json > blogs-data.json.tmp
          mv blogs-data.json.tmp blogs-data.json
          
          # Commit if changed
          if git diff --quiet blogs-data.json; then
            echo "No changes to blog data"
          else
            git config user.email "bot@example.com"
            git config user.name "Blog Bot"
            git add blogs-data.json
            git commit -m "Auto-generated blog post"
            git push origin main
          fi
