name: Generate Blog from Azure Docs Changes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Azure Local doc changes
        id: fetch-commits
        run: |
          SINCE_DATE=$(date -u -d "7 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=${SINCE_DATE}&per_page=5")
          
          echo "commits=$(echo "$RESPONSE" | jq -c '.' )" >> $GITHUB_OUTPUT
      
      - name: Generate blog with Claude
        id: generate-blog
        run: |
          cat > /tmp/gen-blog.js << 'SCRIPT'
          const https = require('https');
          
          async function callClaudeAPI(prompt) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({
                model: "claude-3.5-sonnet",
                messages: [{
                  role: "user",
                  content: prompt
                }],
                max_tokens: 1024
              });
              
              const options = {
                hostname: 'api.github.com',
                path: '/models/chat/completions',
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
                  'Content-Type': 'application/json',
                  'Content-Length': data.length,
                  'User-Agent': 'AzureLocalBlogGenerator'
                }
              };
              
              const req = https.request(options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(body);
                    if (parsed.choices && parsed.choices[0] && parsed.choices[0].message) {
                      resolve(parsed.choices[0].message.content);
                    } else {
                      reject(new Error('No response from Claude'));
                    }
                  } catch (e) {
                    reject(e);
                  }
                });
              });
              
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }
          
          async function generateBlog() {
            const commits = JSON.parse(process.env.COMMITS_DATA);
            
            if (!commits || commits.length === 0) {
              process.exit(0);
            }
            
            const commit = commits[0];
            const title = 'Azure Local Documentation Update — ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
            const message = commit.commit?.message || 'Updated documentation';
            
            try {
              const prompt = `You are a technical blog writer for Azure infrastructure. Write a brief, professional blog post (100-150 words) about this Azure documentation update:\n\nCommit: ${message.split('\\n')[0]}\n\nFocus on: what changed, why it matters for operators, and what they should do. Be concise and actionable.`;
              
              const claudeContent = await callClaudeAPI(prompt);
              const content = `<p class="article-text"><strong>Update Summary:</strong></p><p class="article-text">${claudeContent.replace(/\\n/g, '</p><p class="article-text">')}</p><p class="article-text"><a href="https://github.com/MicrosoftDocs/azure-stack-docs/commit/${commit.sha.slice(0, 7)}" target="_blank">View on GitHub →</a></p>`;
              
              const blogPost = {
                id: 'auto-' + new Date().toISOString().split('T')[0] + '-' + Math.random().toString(36).substr(2, 9),
                title: title,
                subtitle: 'Azure Local documentation improvements',
                date: new Date().toISOString().split('T')[0],
                content: content,
                source: 'Azure Local Docs Monitor',
                auto_generated: true,
                claude_generated: true
              };
              
              console.log(JSON.stringify(blogPost));
            } catch (error) {
              // Fallback: generate basic blog from commit
              const content = `<p class="article-text"><strong>${message.split('\\n')[0]}</strong></p><p class="article-text">Azure Local documentation has been updated. Review the latest changes to ensure your infrastructure deployments remain aligned with current best practices and requirements.</p>`;
              
              const blogPost = {
                id: 'auto-' + new Date().toISOString().split('T')[0] + '-' + Math.random().toString(36).substr(2, 9),
                title: title,
                subtitle: 'Azure Local documentation improvements',
                date: new Date().toISOString().split('T')[0],
                content: content,
                source: 'Azure Local Docs Monitor',
                auto_generated: true
              };
              
              console.log(JSON.stringify(blogPost));
            }
          }
          
          generateBlog().catch(e => {
            console.log(JSON.stringify({
              id: 'auto-' + new Date().toISOString().split('T')[0] + '-fallback',
              title: 'Azure Local Documentation Update',
              subtitle: 'Azure Local documentation improvements',
              date: new Date().toISOString().split('T')[0],
              content: '<p class="article-text">Documentation has been updated. Check the repository for details.</p>',
              source: 'Azure Local Docs Monitor',
              auto_generated: true
            }));
          });
          SCRIPT
          
          node /tmp/gen-blog.js > /tmp/blog-post.json 2>&1
          BLOG_JSON=$(cat /tmp/blog-post.json)
          echo "blog_post=$BLOG_JSON" >> $GITHUB_OUTPUT
        env:
          COMMITS_DATA: ${{ steps.fetch-commits.outputs.commits }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update blogs-data.json
        run: |
          BLOG_JSON='${{ steps.generate-blog.outputs.blog_post }}'
          
          # Check if blog post is valid JSON
          if ! echo "$BLOG_JSON" | jq empty 2>/dev/null; then
            echo "Invalid blog JSON, skipping"
            exit 0
          fi
          
          # Update blogs-data.json
          jq ".auto_posts |= [$(echo "$BLOG_JSON")] + ." blogs-data.json > blogs-data.json.tmp
          mv blogs-data.json.tmp blogs-data.json
          
          # Commit if changed
          if git diff --quiet blogs-data.json; then
            echo "No changes to blog data"
          else
            git config user.email "bot@example.com"
            git config user.name "Blog Bot"
            git add blogs-data.json
            git commit -m "Auto-generated blog post"
            git push origin main
          fi
