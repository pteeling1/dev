name: Azure Blog Generator

on:
  workflow_dispatch: {}
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate and save blog
        run: |
          node --eval '
          const https = require("https");
          
          async function callClaude(prompt) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify({
                model: "claude-3.5-sonnet",
                messages: [{ role: "user", content: prompt }],
                max_tokens: 1024
              });
              
              const req = https.request({
                hostname: "api.github.com",
                path: "/models/chat/completions",
                method: "POST",
                headers: {
                  "Authorization": "Bearer " + process.env.GITHUB_TOKEN,
                  "Content-Type": "application/json",
                  "Content-Length": Buffer.byteLength(data)
                },
                timeout: 30000
              }, (res) => {
                let body = "";
                res.on("data", c => body += c);
                res.on("end", () => {
                  if (res.statusCode !== 200) return reject(new Error("HTTP " + res.statusCode));
                  try {
                    const p = JSON.parse(body);
                    resolve(p.choices[0].message.content);
                  } catch (e) {
                    reject(e);
                  }
                });
              });
              
              req.on("error", reject);
              req.on("timeout", () => { req.destroy(); reject(new Error("Timeout")); });
              req.write(data);
              req.end();
            });
          }
          
          async function fetchCommits() {
            return new Promise((resolve, reject) => {
              const since = new Date(Date.now() - 7*24*3600*1000).toISOString();
              https.get({
                hostname: "api.github.com",
                path: "/repos/MicrosoftDocs/azure-stack-docs/commits?sha=main&since=" + since + "&per_page=50",
                headers: { "Accept": "application/vnd.github.v3+json" }
              }, (res) => {
                let body = "";
                res.on("data", c => body += c);
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(body));
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on("error", reject);
            });
          }
          
          async function fetchFullCommit(sha) {
            return new Promise((resolve, reject) => {
              https.get({
                hostname: "api.github.com",
                path: "/repos/MicrosoftDocs/azure-stack-docs/commits/" + sha,
                headers: { "Accept": "application/vnd.github.v3+json" }
              }, (res) => {
                let body = "";
                res.on("data", c => body += c);
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(body));
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on("error", reject);
            });
          }
          
          async function main() {
            try {
              const commits = await fetchCommits();
              if (!Array.isArray(commits) || !commits.length) {
                console.log(JSON.stringify({
                  id: "auto-none",
                  title: "No Azure Local updates",
                  subtitle: "No changes found",
                  date: new Date().toISOString().split("T")[0],
                  content: "<p class=\"article-text\">No Azure Local documentation updates found this week.</p>",
                  source: "Azure Blog Monitor",
                  auto_generated: true
                }));
                return;
              }
              
              const commit = commits.find(c => /azure.local|deployment|upgrade/i.test(c.commit.message)) || commits[0];
              const full = await fetchFullCommit(commit.sha);
              
              const files = full.files || [];
              const fileList = files.map(f => "- " + f.filename + ": +" + f.additions + " -" + f.deletions).join("\\n");
              const diffs = files.slice(0, 3).map(f => f.patch || "").filter(p => p).join("\\n\\n").slice(0, 2000);
              
              const prompt = "You are an Azure Local infrastructure expert. Write a 90-120 word technical blog post about this Azure Local documentation change for ops teams:\\n\\n**Commit:** " + full.commit.message + "\\n\\n**Files Changed:**\\n" + fileList + "\\n\\n**Diff Preview:**\\n" + diffs + "\\n\\n**Requirements:** 1. Explain what changed and why it matters. 2. Be specific - reference actual changes. 3. Mention operational impact. 4. Be technical but accessible.";
              
              const claudeResp = await callClaude(prompt);
              const html = claudeResp.split("\\n\\n").filter(p => p.trim()).map(p => "<p class=\"article-text\">" + p.trim() + "</p>").join("");
              
              console.log(JSON.stringify({
                id: "auto-" + Date.now(),
                title: "Azure Local Update – " + new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }),
                subtitle: "Documentation changes",
                date: new Date().toISOString().split("T")[0],
                content: html + "<p class=\"article-text\"><a href=\"https://github.com/MicrosoftDocs/azure-stack-docs/commit/" + commit.sha.slice(0, 7) + "\">View commit →</a></p>",
                source: "Azure Blog Monitor",
                auto_generated: true,
                claude_generated: true
              }));
            } catch (e) {
              console.error("Error:", e.message);
              process.exit(1);
            }
          }
          
          main();
          '
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: gen

      - name: Update blogs-data.json
        run: |
          # Ensure file exists
          [ -f blogs-data.json ] || echo "{\"auto_posts\":[]}" > blogs-data.json
          
          # Append blog post
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('blogs-data.json'));
            const blog = \`${{ steps.gen.outputs.blog }}\`;
            if (!blog) process.exit(0);
            try {
              data.auto_posts.unshift(JSON.parse(blog));
              fs.writeFileSync('blogs-data.json', JSON.stringify(data, null, 2));
            } catch (e) {
              console.error('Parse error:', e.message);
              process.exit(1);
            }
          "
          
          # Commit
          if ! git diff --quiet blogs-data.json; then
            git config user.name "Blog Bot"
            git config user.email "bot@example.com"
            git add blogs-data.json
            git commit -m "Auto-generated blog post from Azure Local docs"
            git push origin main
          fi
